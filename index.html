<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniHive</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:32px;
font-weight:700;
color:#00e5ff;
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:15px;
transition:0.3s;
}

.nav-links a:hover{
color:#00e5ff;
}

.search-box{
padding:12px 20px;
border:none;
border-radius:30px;
width:240px;
background:#151515;
color:white;
outline:none;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1600');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:80px;
}

.hero-content{
max-width:650px;
}

.hero h1{
font-size:90px;
line-height:1;
color:#00e5ff;
margin-bottom:20px;
}

.hero p{
font-size:22px;
color:#ddd;
line-height:1.7;
margin-bottom:30px;
}

.buttons{
display:flex;
gap:20px;
}

.btn{
padding:16px 35px;
border:none;
border-radius:40px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.watch-btn{
background:#00e5ff;
color:black;
}

.login-btn{
background:white;
color:black;
}

.btn:hover{
transform:scale(1.05);
}

/* SECTION */

.section{
padding:80px 50px;
}

.section-title{
font-size:60px;
margin-bottom:40px;
color:#00e5ff;
}

/* GRID */

.anime-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:30px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px rgba(0,229,255,0.3);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card-content h3{
font-size:24px;
margin-bottom:10px;
}

.card-content p{
color:#aaa;
}

/* LOGIN POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:#111;
padding:40px;
border-radius:20px;
width:320px;
z-index:2000;
transition:0.3s;
}

.popup.active{
transform:translate(-50%,-50%) scale(1);
}

.popup h2{
margin-bottom:20px;
text-align:center;
}

.popup input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

.popup button{
width:100%;
padding:14px;
border:none;
background:#00e5ff;
color:black;
font-weight:700;
border-radius:10px;
cursor:pointer;
}

.close-btn{
position:absolute;
top:10px;
right:15px;
font-size:25px;
cursor:pointer;
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
z-index:1500;
}

.overlay.active{
display:block;
}

/* MOBILE */

@media(max-width:768px){

.navbar{
flex-direction:column;
gap:15px;
padding:15px;
}

.logo{
font-size:45px;
}

.nav-links{
flex-wrap:wrap;
justify-content:center;
}

.search-box{
width:100%;
}

.hero{
padding:25px;
text-align:center;
justify-content:center;
}

.hero h1{
font-size:60px;
}

.hero p{
font-size:20px;
}

.buttons{
justify-content:center;
flex-wrap:wrap;
}

.section{
padding:60px 20px;
}

.section-title{
font-size:45px;
text-align:center;
}

.anime-grid{
grid-template-columns:1fr 1fr;
gap:15px;
}

.card img{
height:240px;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">AniHive</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">Trending</a>
<a href="#">Movies</a>
<a href="#">Latest</a>
</div>

<input type="text" class="search-box" placeholder="Search anime...">

</nav>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>Solo Leveling</h1>

<p>
Watch premium anime with cinematic UI and smooth streaming experience on all devices.
</p>

<div class="buttons">

<button class="btn watch-btn">▶ Watch Now</button>

<button class="btn login-btn" onclick="openPopup()">Login</button>

</div>

</div>

</section>

<!-- TRENDING -->

<section class="section">

<h2 class="section-title">Trending Anime</h2>

<div class="anime-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200">
<div class="card-content">
<h3>Dark Ninja</h3>
<p>Action Anime</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1200">
<div class="card-content">
<h3>Shadow Hero</h3>
<p>Fantasy Anime</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200">
<div class="card-content">
<h3>Cyber Tokyo</h3>
<p>Sci-Fi Anime</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200">
<div class="card-content">
<h3>Dragon World</h3>
<p>Adventure Anime</p>
</div>
</div>

</div>

</section>

<!-- LOGIN -->

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">

<div class="close-btn" onclick="closePopup()">×</div>

<h2>Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

<script>

function openPopup(){
document.getElementById("popup").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closePopup(){
document.getElementById("popup").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

</script>

</body>
</html>
