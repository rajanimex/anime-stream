<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anime Stream</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0d0d0d;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:black;
}

.logo{
font-size:35px;
font-weight:bold;
color:red;
}

.search-box input{
padding:10px;
width:250px;
border:none;
border-radius:10px;
}

.login-btn{
background:red;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}

.hero{
height:80vh;
background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1400&auto=format&fit=crop') center/cover;
display:flex;
align-items:center;
padding-left:60px;
}

.hero-content{
background:rgba(0,0,0,0.7);
padding:30px;
border-radius:20px;
width:500px;
}

.hero h1{
font-size:60px;
color:red;
margin-bottom:20px;
}

.hero p{
line-height:1.7;
margin-bottom:20px;
}

.watch-btn{
background:red;
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.section-title{
padding:40px;
font-size:35px;
color:red;
}

.movies{
display:flex;
gap:25px;
flex-wrap:wrap;
justify-content:center;
padding-bottom:50px;
}

.card{
background:#1b1b1b;
width:280px;
border-radius:20px;
overflow:hidden;
transition:0.4s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:350px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card button{
background:red;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.upload{
text-align:center;
padding:40px;
}

.upload input{
margin-top:20px;
color:white;
}

footer{
background:black;
text-align:center;
padding:25px;
color:#888;
}

</style>

</head>

<body>

<header>

<div class="logo">ANIME STREAM</div>

<div class="search-box">
<input type="text" placeholder="Search Anime...">
</div>

<button class="login-btn">Login</button>

</header>

<section class="hero">

<div class="hero-content">

<h1>Watch Anime Online</h1>

<p>
Best anime streaming website with HD quality and modern design.
</p>

<button class="watch-btn">Watch Now</button>

</div>

</section>

<h1 class="section-title">Trending Anime</h1>

<section class="movies">

<div class="card">

<img src="https://picsum.photos/300/400?1">

<div class="card-content">

<h2>Demon Shadow</h2>

<p>Action Anime</p>

<button>Watch</button>

</div>

</div>

<div class="card">

<img src="https://picsum.photos/300/400?2">

<div class="card-content">

<h2>Ninja War</h2>

<p>Adventure Anime</p>

<button>Watch</button>

</div>

</div>

<div class="card">

<img src="https://picsum.photos/300/400?3">

<div class="card-content">

<h2>Tokyo Fight</h2>

<p>Dark Anime</p>

<button>Watch</button>

</div>

</div>

</section>

<section class="upload">

<h1>Upload Anime</h1>

<input type="file">

</section>

<footer>

© 2026 Anime Stream

</footer>

</body>

</html>
