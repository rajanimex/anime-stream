<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniHive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
padding:20px;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
margin-bottom:25px;
flex-wrap:wrap;
}

.logo{
font-size:32px;
font-weight:bold;
}

.search-box{
flex:1;
display:flex;
justify-content:center;
}

.search-box input{
width:100%;
max-width:500px;
padding:14px 18px;
border:none;
border-radius:30px;
background:#fff;
font-size:15px;
outline:none;
}

.menu{
display:flex;
gap:12px;
align-items:center;
}

.menu button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#fff;
cursor:pointer;
font-weight:bold;
}

.menu .active{
background:#00d9ff;
color:black;
}

/* HERO */

.hero{
height:420px;
border-radius:25px;
overflow:hidden;
position:relative;
background:
linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.8)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1400');
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:35px;
margin-bottom:35px;
}

.hero-content{
max-width:500px;
}

.hero h1{
font-size:55px;
margin-bottom:10px;
}

.hero p{
color:#ddd;
line-height:1.6;
margin-bottom:20px;
}

.hero button{
padding:14px 25px;
border:none;
border-radius:30px;
background:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* SECTION */

.section-title{
font-size:34px;
margin-bottom:25px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:#121212;
border-radius:18px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.card-content h3{
font-size:18px;
margin-bottom:6px;
}

.card-content p{
font-size:13px;
color:#aaa;
}

/* MOBILE */

@media(max-width:768px){

body{
padding:12px;
}

.topbar{
flex-direction:column;
align-items:stretch;
}

.logo{
text-align:center;
font-size:28px;
}

.search-box{
width:100%;
}

.search-box input{
max-width:100%;
}

.menu{
justify-content:center;
flex-wrap:wrap;
}

.hero{
height:320px;
padding:20px;
border-radius:18px;
}

.hero h1{
font-size:36px;
}

.hero p{
font-size:14px;
}

.hero button{
width:100%;
}

.section-title{
font-size:28px;
text-align:center;
}

.cards{
grid-template-columns:1fr 1fr;
gap:12px;
}

.card img{
height:190px;
}

.card-content h3{
font-size:15px;
}

}

</style>

</head>
<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo">
AniHive
</div>

<div class="search-box">
<input type="text" placeholder="Search for something...">
</div>

<div class="menu">
<button>Explore</button>
<button>New</button>
<button class="active">Saved</button>
</div>

</div>

<!-- HERO -->

<section class="hero">

<div class="hero-content">

<h1>Solo Leveling</h1>

<p>
Watch premium anime shows with modern dark UI and smooth mobile experience.
</p>

<button>
▶ Watch Now
</button>

</div>

</section>

<!-- TRENDING -->

<h2 class="section-title">
Saved Shows
</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200">
<div class="card-content">
<h3>Dark Ninja</h3>
<p>Action Anime</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1200">
<div class="card-content">
<h3>Shadow Hero</h3>
<p>Fantasy Anime</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200">
<div class="card-content">
<h3>Tokyo Fight</h3>
<p>Adventure Anime</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200">
<div class="card-content">
<h3>Dragon Fire</h3>
<p>Trending Anime</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200">
<div class="card-content">
<h3>Cyber World</h3>
<p>Sci-Fi Anime</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1200">
<div class="card-content">
<h3>Night Hunter</h3>
<p>Dark Anime</p>
</div>
</div>

</div>

</body>
</html>
