<!DOCTYPE html>
<html>
<head>
    <title>Anime Stream</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1 class="logo">ANIME STREAM</h1>

    <input type="text" placeholder="Search Anime..." class="search-box">

    <button class="login-btn" onclick="showLogin()">Login</button>
</header>

<section class="hero">
    <div class="overlay">
        <h1>Watch Anime Online</h1>

        <p>
            Best anime streaming website with HD quality and modern design.
        </p>

        <button class="watch-btn">
            Watch Now
        </button>
    </div>
</section>

<section class="trending">

    <h2>Trending Anime</h2>

    <div class="cards">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1200">

            <div class="card-content">
                <h3>Ninja War</h3>
                <p>Action Anime</p>
                <button>Watch</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200">

            <div class="card-content">
                <h3>Tokyo Fight</h3>
                <p>Dark Anime</p>
                <button>Watch</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200">

            <div class="card-content">
                <h3>Dragon Hero</h3>
                <p>Fantasy Anime</p>
                <button>Watch</button>
            </div>
        </div>

    </div>

</section>

<script>
function showLogin(){
    alert("Login System Coming Soon 🔥");
}
</script>

</body>
</html>
